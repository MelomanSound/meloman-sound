<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Meloman Sound | Админка</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#F2F2F7;padding:20px;padding-bottom:100px}
        .login-screen{text-align:center;padding-top:100px}.login-screen h2{margin-bottom:20px}
        .login-input{width:100%;max-width:300px;padding:16px;border:1px solid #E5E5EA;border-radius:14px;font-size:17px;text-align:center;margin-bottom:12px;background:rgba(255,255,255,0.5);backdrop-filter:blur(10px)}
        .login-btn{background:#007AFF;color:#FFF;border:none;padding:16px 40px;border-radius:100px;font-weight:700;font-size:17px;cursor:pointer}
        .login-error{color:#FF3B30;font-size:14px;margin-top:8px;display:none}
        .admin-content{display:none}h1{margin-bottom:8px;color:#1C1C1E}
        .booking-card{background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .booking-info strong{color:#007AFF}.booking-info .date{font-size:14px;color:#636366;margin-top:4px}
        .new-badge{background:#FF3B30;color:#FFF;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:700;margin-left:8px;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .top-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .refresh-btn{background:#007AFF;color:#FFF;border:none;padding:12px 20px;border-radius:100px;font-weight:600;cursor:pointer;font-size:15px}
        .sound-btn{color:#FFF;border:none;padding:12px 20px;border-radius:100px;font-weight:600;cursor:pointer;font-size:15px}
        .sound-on{background:#34C759}.sound-off{background:#8E8E93}
        .notify-btn{color:#FFF;border:none;padding:12px 20px;border-radius:100px;font-weight:600;cursor:pointer;font-size:15px;background:#FF9500}
        .logout-btn{color:#FFF;border:none;padding:12px 20px;border-radius:100px;font-weight:600;cursor:pointer;font-size:15px;background:#8E8E93}
        .delete-btn{background:#FF3B30;color:#FFF;border:none;padding:10px 16px;border-radius:100px;font-weight:600;cursor:pointer;font-size:13px;white-space:nowrap}
        .empty{text-align:center;color:#8E8E93;padding:40px}
        .counter{background:#FF3B30;color:#FFF;padding:4px 10px;border-radius:100px;font-size:13px;font-weight:700;margin-left:8px}
        .status{font-size:13px;margin-bottom:16px;font-weight:600}
        .popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center}
        .popup-overlay.show{display:flex}
        .popup-box{background:#FFF;border-radius:24px;padding:30px 24px;text-align:center;max-width:350px;width:90%;animation:popIn .4s ease}
        @keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
        .popup-icon{font-size:60px;margin-bottom:12px}.popup-title{font-size:22px;font-weight:800;margin-bottom:6px}
        .popup-name{font-size:18px;color:#007AFF;font-weight:700}.popup-detail{font-size:14px;color:#636366;margin-bottom:2px}
        .popup-close{background:#007AFF;color:#FFF;border:none;padding:14px 40px;border-radius:100px;font-weight:700;font-size:16px;cursor:pointer;margin-top:16px}
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <h2>🔐 Вход в админку</h2>
        <input type="password" class="login-input" id="passwordInput"
