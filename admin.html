<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Meloman Sound | Админка</title>
    <style>
        body{font-family:-apple-system,sans-serif;background:#F2F2F7;padding:20px}
        .login-screen{text-align:center;padding-top:80px}
        input{padding:16px;border:1px solid #E5E5EA;border-radius:14px;font-size:17px;text-align:center;margin:8px;width:260px}
        button{background:#007AFF;color:#FFF;border:none;padding:14px 30px;border-radius:100px;font-weight:700;font-size:16px;cursor:pointer;margin:4px}
        .card{background:#FFF;border-radius:16px;padding:16px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
        .counter{background:#FF3B30;color:#FFF;padding:4px 10px;border-radius:100px;font-size:13px}
        .delete-btn{background:#FF3B30;color:#FFF;border:none;padding:8px 16px;border-radius:100px;cursor:pointer}
        .empty{text-align:center;color:#8E8E93;padding:40px}
    </style>
</head>
<body>
<div id="loginScreen">
    <h2>🔐 Вход</h2>
    <input type="password" id="passInput" placeholder="Пароль"><br>
    <button onclick="login()">Войти</button>
    <p id="loginError" style="color:#FF3B30;display:none">❌ Неверный пароль</p>
</div>
<div id="adminContent" style="display:none">
    <h1>🎙️ Заявки <span class="counter" id="counter">0</span></h1>
    <input type="password" id="tokenInput" placeholder="Вставь GitHub токен">
    <button onclick="saveToken()">💾 Сохранить токен</button>
    <button onclick="loadBookings()">🔄 Обновить</button>
    <button onclick="logout()">🚪 Выйти</button>
    <div id="bookingsList"></div>
</div>
<script>
const PASS='meloman2026';
const REPO='melomansound/meloman-sound';
if(localStorage.getItem('admin_logged')==='true'){document.getElementById('loginScreen').style.display='none';document.getElementById('adminContent').style.display='block';document.getElementById('tokenInput').value=localStorage.getItem('gh_token')||''}
function login(){if(document.getElementById('passInput').value===PASS){localStorage.setItem('admin_logged','true');document.getElementById('loginScreen').style.display='none';document.getElementById('adminContent').style.display='block'}else{document.getElementById('loginError').style.display='block'}}
function logout(){localStorage.removeItem('admin_logged');location.reload()}
function saveToken(){const t=document.getElementById('tokenInput').value.trim();if(t){localStorage.setItem('gh_token',t);alert('✅ Токен сохранён!')}}
function loadBookings(){
    const token=localStorage.getItem('gh_token');
    if(!token){alert('Сначала вставь и сохрани токен GitHub!');return}
    fetch(`https://api.github.com/repos/${REPO}/issues?state=open&labels=booking`,{headers:{'Authorization':`token ${token}`}})
    .then(r=>r.json()).then(issues=>{
        document.getElementById('counter').textContent=issues.length;
        if(!issues.length){document.getElementById('bookingsList').innerHTML='<div class="empty">📭 Пусто</div>';return}
        document.getElementById('bookingsList').innerHTML=issues.map(i=>{
            const b=i.body||'';
            return `<div class="card"><div><strong>${(b.match(/👤 Имя: (.+)/)||['','-'])[1]}</strong><div>📞 ${(b.match(/📞 Телефон: (.+)/)||['','-'])[1]}</div><div>📅 ${(b.match(/📅 Дата: (.+)/)||['','-'])[1]} | ⏰ ${(b.match(/⏰ Время: (.+)/)||['','-'])[1]}</div></div><button class="delete-btn" onclick="deleteBooking(${i.number})">🗑</button></div>`;
        }).reverse().join('');
    }).catch(()=>alert('Ошибка загрузки'))
}
function deleteBooking(n){if(!confirm('Удалить?'))return;const token=localStorage.getItem('gh_token');fetch(`https://api.github.com/repos/${REPO}/issues/${n}`,{method:'PATCH',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({state:'closed'})}).then(()=>loadBookings()).catch(()=>alert('Ошибка'))}
setInterval(loadBookings,5000);
</script>
</body>
</html>
